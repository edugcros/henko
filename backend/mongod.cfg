# ------------------------------------------------------------------
# CONFIGURACIÓN DE MONGODB PARA PRODUCCIÓN - TIENDA henko
# ------------------------------------------------------------------

systemLog:
  destination: file
  path: D:\data\log\mongod.log
  logAppend: true
  verbosity: 0  # 0 = mínimo, 5 = muy detallado

storage:
  dbPath: D:\data\db
  wiredTiger:
    engineConfig:
      cacheSizeGB: 2  # Ajusta según RAM disponible

net:
  port: 27017
  bindIp: 127.0.0.1  # Solo local, opcional agregar IP interna
  maxIncomingConnections: 65536

security:
  authorization: enabled  # OBLIGATORIO para producción
  keyFile: D:\data\security\mongodb-keyfile  # Archivo keyFile para replica set

replication:
  replSetName: "rs0"  # Nombre del conjunto de réplicas para transacciones

operationProfiling:
  mode: slowOp
  slowOpThresholdMs: 100  # Log consultas > 100ms

# ------------------------------------------------------------------
#net start MongoDB
